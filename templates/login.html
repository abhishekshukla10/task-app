{% extends "base.html" %}

{% block title %}Login - My Tasks{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1 class="auth-title">My Tasks</h1>
        <p class="auth-subtitle">Your AI-powered task coach</p>

        <!-- Tab switcher -->
        <div class="auth-tabs">
            <button class="auth-tab active" id="login-tab" onclick="switchTab('login')">Login</button>
            <button class="auth-tab" id="signup-tab" onclick="switchTab('signup')">Sign Up</button>
        </div>

        <!-- Login Form -->
        <form method="POST" action="{{ url_for('auth.login') }}" id="login-form" class="auth-form">
            <div class="form-group">
                <label for="login-email">Email</label>
                <input type="email" id="login-email" name="email" required autocomplete="email">
            </div>
            
            <div class="form-group">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" name="password" required autocomplete="current-password">
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">Login</button>
        </form>

        <!-- Signup Form -->
        <form method="POST" action="{{ url_for('auth.signup') }}" id="signup-form" class="auth-form" style="display: none;">
            <div class="form-group">
                <label for="signup-email">Email</label>
                <input type="email" id="signup-email" name="email" required autocomplete="email">
            </div>
            
            <div class="form-group">
                <label for="signup-password">Password</label>
                <input type="password" id="signup-password" name="password" required autocomplete="new-password" minlength="6">
                <small>At least 6 characters</small>
            </div>
            
            <div class="form-group">
                <label for="signup-password-confirm">Confirm Password</label>
                <input type="password" id="signup-password-confirm" name="password_confirm" required autocomplete="new-password">
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">Create Account</button>
        </form>
    </div>
</div>

<script>
function switchTab(tab) {
    const loginTab = document.getElementById('login-tab');
    const signupTab = document.getElementById('signup-tab');
    const loginForm = document.getElementById('login-form');
    const signupForm = document.getElementById('signup-form');
    
    if (tab === 'login') {
        loginTab.classList.add('active');
        signupTab.classList.remove('active');
        loginForm.style.display = 'block';
        signupForm.style.display = 'none';
    } else {
        signupTab.classList.add('active');
        loginTab.classList.remove('active');
        signupForm.style.display = 'block';
        loginForm.style.display = 'none';
    }
}

// Auto-switch to signup if there's a "signup" query param
if (window.location.search.includes('signup')) {
    switchTab('signup');
}
</script>
{% endblock %}
